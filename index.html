<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú del Día - La Fogata</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    max-width:800px;
    width:100%;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.banner{
    width:100%;
    height:300px;
    object-fit:cover;
}

.content{
    padding:30px;
}

h1{
    color:#d35400;
    text-align:center;
    margin-bottom:10px;
}

.fecha{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.precio{
    background:#d35400;
    color:white;
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    padding:15px;
    border-radius:15px;
    margin-bottom:25px;
}

.menu{
    background:#fafafa;
    border-left:5px solid #d35400;
    padding:20px;
    border-radius:10px;
}

.menu h2{
    margin-bottom:15px;
    color:#333;
}

.menu ul{
    list-style:none;
}

.menu li{
    padding:10px 0;
    border-bottom:1px solid #ddd;
}

.menu li:last-child{
    border-bottom:none;
}

.footer{
    text-align:center;
    padding:20px;
    background:#f8f8f8;
    color:#666;
}

.whatsapp{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    font-weight:bold;
    transition:0.3s;
}

.whatsapp:hover{
    background:#1ea952;
}

@media(max-width:600px){
    .banner{
        height:220px;
    }

    .precio{
        font-size:1.6rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Cambia la imagen -->
    <img src="https://github.com/yonalex09/La-Fogata---Menu/blob/main/Menu.png?raw=true" alt="Menú del día" class="banner">

    <div class="content">

        <h1>🔥 Menú del Día</h1>

        <p class="fecha">21 de Junio de 2026</p>

        <div class="precio">
            $28.000
        </div>

        <div class="menu">
            <h2>Incluye:</h2>

            <ul>
                <li>🍲 Delicioso Consome de pescado</li>
                <li>🍗 Tilapia Frita</li>
                <li>🍚 Arroz con coco</li>
                <li>🥗 Guacamole<li>
                <li>🍌 Patacón</li>
                <li>🥤 Cirope con canela</li>
            </ul>
        </div>
        <a class="whatsapp" href="https://wa.me/573133723742?text=Hola,%20quiero%20información%20sobre%20el%20menú%20del%20día" target="_blank">
    📱 Pedir por WhatsApp
</a>

    </div>

    <div class="footer">
        La Fogata Picnic • Comida Casera
    </div>

</div>

</body>
</html>
